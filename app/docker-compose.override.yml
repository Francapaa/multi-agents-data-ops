services:
  backend:
    entrypoint: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["pnpm", "dev"]

  worker:
    entrypoint: ["bash", "/app/entrypoint.sh"]
    volumes:
      - ./backend:/app
      - /app/__pycache__
